# Ocam Camera Configuration Example for Kalibr
# This file demonstrates how to configure an Ocam camera for calibration
# Based on the park_front.json parameters

cam0:
  camera_model: ocam
  # intrinsics format:
  # [cx, cy, c, d, e, w2c_len, c2w_len, w2c_coeffs..., c2w_coeffs...]
  # 
  # Where:
  #   cx, cy: principal point (pixels)
  #   c, d, e: affine transformation parameters
  #   w2c_len: number of world2cam polynomial coefficients
  #   c2w_len: number of cam2world polynomial coefficients
  #   w2c_coeffs: world2cam polynomial coefficients (projection 3D->2D)
  #   c2w_coeffs: cam2world polynomial coefficients (back-projection 2D->3D)
  #
  # Example values from park_front.json:
  intrinsics: [
    961.44189453125,      # cx
    764.6656494140625,    # cy
    0.9988817572593689,   # c (affine)
    0.00048447417793795466, # d (affine)
    -0.000787204597145319,  # e (affine)
    12,                   # world2cam polynomial length
    5,                    # cam2world polynomial length
    # world2cam coefficients (12 values)
    829.33251953125, 637.10107421875, 51.23870849609375, 58.38129425048828,
    80.20258331298828, -4.643816947937012, 10.809462547302246, 51.23932647705078,
    3.196411371231079, -35.826011657714844, -21.63343048095703, -3.894087314605713,
    # cam2world coefficients (5 values)
    -414.9294128417969, 0.0, 0.0003165224625263363, 2.5380396095897595e-07, 1.1088343437881676e-10
  ]
  distortion_model: none
  distortion_coeffs: []
  resolution: [1920, 1536]
  rostopic: /camera/image_raw

# Target configuration for calibration
target:
  type: checkerboard
  rows: 6
  cols: 7
  row_spacing: 0.06  # 6cm in meters
  col_spacing: 0.06  # 6cm in meters
